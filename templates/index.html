<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Organizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Photo Organizer</h1>
        <form action="/organize" method="post">
            <div class="form-group">
                <label for="source_dir">Source Directory:</label>
                <div class="path-input">
                    <input type="text" id="source_dir" name="source_dir" required>
                    <button type="button" class="browse-btn" data-target="source_dir">Browse...</button>
                </div>
            </div>
            <div class="form-group">
                <label for="dest_dir">Destination Directory:</label>
                <div class="path-input">
                    <input type="text" id="dest_dir" name="dest_dir" required>
                    <button type="button" class="browse-btn" data-target="dest_dir">Browse...</button>
                </div>
            </div>
            <div class="form-group">
                <label for="strategy">Organization Strategy:</label>
                <select id="strategy" name="strategy">
                    <option value="date">Date</option>
                    <option value="location">Location</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cloud Sync:</label>
                <input type="checkbox" id="sync_google_drive" name="sync_google_drive" value="true">
                <label for="sync_google_drive">Google Drive</label>
                <input type="checkbox" id="sync_one_drive" name="sync_one_drive" value="true">
                <label for="sync_one_drive">OneDrive</label>
            </div>
            <button type="submit">Organize Photos</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const browseButtons = document.querySelectorAll('.browse-btn');
            browseButtons.forEach(button => {
                button.addEventListener('click', async () => {
                    try {
                        // Show some feedback to the user
                        button.textContent = 'Loading...';
                        const response = await fetch('/select-folder');
                        const data = await response.json();
                        if (data.path) {
                            const targetInputId = button.getAttribute('data-target');
                            document.getElementById(targetInputId).value = data.path;
                        }
                    } catch (error) {
                        console.error('Error fetching folder path:', error);
                        alert('Could not open folder selection dialog. See console for details.');
                    } finally {
                        // Restore button text
                        button.textContent = 'Browse...';
                    }
                });
            });
        });
    </script>
</body>
</html>
